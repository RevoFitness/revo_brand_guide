<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revo Spinner</title>
  <style>
    :root {
      --brand-red: #DD2B32;
      --brand-pink: #F392BD;
      --brand-black: #333132;
      --warm-white: #FFFDF9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101114;
      font-family: "Greycliff CF", Inter, "Segoe UI", Arial, sans-serif;
    }

    .revo-spinner {
      width: 52px;
      height: 52px;
      border: 5px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--warm-white);
      border-right-color: var(--brand-pink);
      border-radius: 50%;
      animation: revo-spin 1s linear infinite;
    }

    @keyframes revo-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="revo-spinner" aria-label="Loading" role="status"></div>
</body>
</html>
